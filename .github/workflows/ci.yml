name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: write        # để publish .ipa lên Release

jobs:
  # 1) Kiểm chứng bản port Swift: chạy unit test đối chiếu byte với Python
  test-fujikit:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: swift test (FujiKit)
        run: swift test
        working-directory: swift/FujiKit

  # 2) Build app iOS ra .ipa CHƯA KÝ (cài bằng SideStore/AltStore + Apple ID free)
  build-ipa:
    runs-on: macos-14
    needs: test-fujikit
    steps:
      - uses: actions/checkout@v4
      - name: Chọn Xcode mới nhất (đọc được project format của XcodeGen)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Cài XcodeGen
        run: brew install xcodegen
      - name: Sinh project
        run: xcodegen generate
        working-directory: ios
      - name: Build (.app, không ký)
        run: |
          set -o pipefail
          xcodebuild -project RecipeFlash.xcodeproj -scheme RecipeFlash \
            -sdk iphoneos -configuration Release -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGNING_IDENTITY="" \
            2>&1 | tee build.log || echo "BUILD_FAILED=1" >> "$GITHUB_ENV"
          if [ "${BUILD_FAILED:-0}" = "1" ] || grep -q "error:" build.log; then
            echo "==================== SWIFT ERRORS ===================="
            grep -E ": error:|error: " build.log | sed 's#.*/RecipeFlash/#RecipeFlash/#' | sort -u | head -60
            echo "====================================================="
            grep -E ": error:|error: " build.log | sed 's#.*/RecipeFlash/#RecipeFlash/#' | sort -u | head -60 \
              | while IFS= read -r l; do echo "::error::$l"; done
            exit 1
          fi
        working-directory: ios
      - name: Đóng gói .ipa + sinh apps.json (SideStore source)
        env:
          VER: "1.0.${{ github.run_number }}"
          BUILD: "${{ github.run_number }}"
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          # Bump version (unsigned nên vá Info.plist sau build thoải mái) → SideStore/AltStore
          # phát hiện được bản mới để auto-update.
          plutil -replace CFBundleShortVersionString -string "$VER" RecipeFlash.app/Info.plist
          plutil -replace CFBundleVersion -string "$BUILD" RecipeFlash.app/Info.plist
          echo "--- App Info.plist (khóa quan trọng) ---"
          plutil -p RecipeFlash.app/Info.plist | grep -E "CFBundleIdentifier|CFBundleExecutable|CFBundlePackageType|MinimumOSVersion|CFBundleSupportedPlatforms|UIDeviceFamily|CFBundleShortVersionString|CFBundleVersion" || true
          mkdir -p Payload
          cp -R RecipeFlash.app Payload/
          zip -qr RecipeFlash-unsigned.ipa Payload
          export SIZE=$(stat -f%z RecipeFlash-unsigned.ipa)
          echo "IPA size = $SIZE bytes, version = $VER"
          python3 "$GITHUB_WORKSPACE/ci/make_source.py" apps.json
          echo "--- apps.json ---"; cat apps.json
          echo "--- IPA listing ---"; unzip -l RecipeFlash-unsigned.ipa | head -20
      - uses: actions/upload-artifact@v4
        with:
          name: RecipeFlash-unsigned-ipa
          path: ios/build/Build/Products/Release-iphoneos/RecipeFlash-unsigned.ipa
      # Đính .ipa thẳng vào Release "latest" → tải trực tiếp .ipa (không zip, tải trên
      # điện thoại cũng được, không cần login).
      - name: Publish .ipa + apps.json lên Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "RecipeFlash — bản mới nhất (.ipa)"
          body: |
            **Cách 1 (khuyên dùng) — SideStore/AltStore Source (cài + auto-update 1 chạm):**
            Thêm source URL này vào SideStore → Sources → +:
            `https://github.com/duykhoi07012000/iOStoXS20/releases/download/latest/apps.json`

            **Cách 2 — tải .ipa thủ công:** tải `RecipeFlash-unsigned.ipa` bên dưới rồi
            SideStore → My Apps → + → chọn file. (ĐỪNG tải từ Actions/Artifacts — đó là .zip.)

            Build tự động từ commit mới nhất.
          files: |
            ios/build/Build/Products/Release-iphoneos/RecipeFlash-unsigned.ipa
            ios/build/Build/Products/Release-iphoneos/apps.json
