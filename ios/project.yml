# XcodeGen — sinh RecipeFlash.xcodeproj trên cloud Mac (`xcodegen generate`).
# Không cần commit file .xcodeproj; CI tự tạo.
name: RecipeFlash
options:
  bundleIdPrefix: com.iostoxs20
  deploymentTarget:
    iOS: "16.0"        # UI dùng NavigationStack (iOS16), safeAreaInset/foregroundStyle (iOS15)
  createIntermediateGroups: true

packages:
  FujiKit:
    path: ../swift/FujiKit

targets:
  RecipeFlash:
    type: application
    platform: iOS
    sources:
      - RecipeFlash/Sources
      - path: RecipeFlash/Resources
        buildPhase: resources
    dependencies:
      - package: FujiKit
    # XcodeGen TỰ sinh Info.plist đầy đủ (CFBundleIdentifier, CFBundleExecutable,
    # CFBundlePackageType…) + merge các khóa custom dưới đây → gói app hợp lệ cho AltStore.
    info:
      path: RecipeFlash/Info.plist
      properties:
        CFBundleDisplayName: Fuji Recipe Flash
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocalNetworkUsageDescription: "Ứng dụng cần kết nối tới máy ảnh Fujifilm trong cùng mạng Wi-Fi để đẩy film recipe."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iostoxs20.recipeflash
        TARGETED_DEVICE_FAMILY: "1"          # iPhone
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
